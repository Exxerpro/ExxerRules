name: CI

on:
  push:
    branches:
      - "**"           # run on all branches (handled by job conditions)
  pull_request:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      full:
        description: "Force full build + tests"
        required: false
        default: "false"
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday smoke build

jobs:
  # Smoke job: restore + build only
  smoke:
    runs-on: windows-latest
    if: >-
      ${{ !(
          startsWith(github.ref, 'refs/heads/integration') ||
          startsWith(github.ref, 'refs/heads/release/')    ||
          startsWith(github.ref, 'refs/heads/feature/')    ||
          github.event_name == 'pull_request'              ||
          contains(github.event.head_commit.message, '[ci full]') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.full == 'true')
      ) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET (10 preview)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets') }}
      - name: Restore
        run: |
          dotnet --info
          dotnet restore src/IndFusion.sln --configfile src/NuGet.online.config
      - name: Build
        run: dotnet build src/IndFusion.sln -c Release --no-restore

  # Full job: restore + build + test
  full:
    runs-on: windows-latest
    if: >-
      ${{ startsWith(github.ref, 'refs/heads/integration') ||
          startsWith(github.ref, 'refs/heads/release/')    ||
          startsWith(github.ref, 'refs/heads/feature/')    ||
          github.event_name == 'pull_request'              ||
          contains(github.event.head_commit.message, '[ci full]') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.full == 'true') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET (10 preview)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets') }}
      - name: Restore
        run: |
          dotnet --info
          dotnet restore src/IndFusion.sln --configfile src/NuGet.online.config
      - name: Build
        run: dotnet build src/IndFusion.sln -c Release --no-restore
      - name: Test (xUnit v3)
        run: dotnet test src/IndFusion.sln -c Release --no-build --nologo
